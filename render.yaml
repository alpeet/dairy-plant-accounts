# Godhuli Dairy Plant - Render Blueprint
# Deploy config for Render.com free tier
# See https://render.com/docs/blueprint-spec for more info
#
# IMPORTANT AFTER DEPLOY:
#   1. Go to Render Dashboard → Environment → Set AUTH_PASSWORD to a strong password
#   2. The free tier sleeps after 15 min idle — data persists via mounted disk

services:
  - type: web
    name: godhuli-dairy-plant
    env: node
    buildCommand: npm install --production --ignore-scripts && npm rebuild better-sqlite3
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AUTH_USERNAME
        value: admin
      - key: DB_DIR
        value: /opt/render/project/src/data
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
