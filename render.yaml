# Godhuli Dairy Plant - Render Blueprint
# ===============================================
# Deploy config for Render.com (free tier compatible)
# See https://render.com/docs/blueprint-spec for more info
#
# PERSISTENT DATA:
#   A 1GB persistent disk is mounted at /opt/render/project/src/data
#   The SQLite database is stored there → data survives restarts & sleep cycles
#   Free tier: service sleeps after 15 min idle, wakes on first request (a few sec delay)
#
# ADMIN LOGIN (after deploy):
#   Username: admin
#   Password: admin123
#   ⚠️  IMPORTANT: Change this password IMMEDIATELY after first login!
#   Go to Settings → User Management → Change Password
#
# TO CHANGE ADMIN PASSWORD (more secure):
#   Go to Render Dashboard → Environment → Set AUTH_PASSWORD to your own value
#   Then redeploy or restart the service

services:
  - type: web
    name: godhuli-dairy-plant
    env: node
    buildCommand: npm install --production --ignore-scripts && npm rebuild better-sqlite3
    # Run the Excel import on startup (idempotent - skips if data already exists)
    # Server starts regardless of import result (semicolon, not &&)
    startCommand: node import-excel.js; npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        value: admin123
      - key: DB_DIR
        value: /opt/render/project/src/data
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
